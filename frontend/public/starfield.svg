<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="star-soft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- sparse, dim starfield -->
  <g fill="white" fill-opacity="0.14">
    <circle cx="36" cy="40" r="0.7" />
    <circle cx="140" cy="28" r="0.8" />
    <circle cx="220" cy="68" r="0.7" />
    <circle cx="52" cy="132" r="0.7" />
    <circle cx="176" cy="140" r="0.8" />
    <circle cx="32" cy="212" r="0.7" />
    <circle cx="144" cy="216" r="0.8" />
    <circle cx="228" cy="204" r="0.7" />
  </g>

  <!-- a few subtle brighter stars with soft glow -->
  <g>
    <circle cx="80" cy="72" r="1.4" fill="white" fill-opacity="0.8" />
    <circle cx="80" cy="72" r="7" fill="url(#star-soft)" fill-opacity="0.45" />

    <circle cx="196" cy="112" r="1.5" fill="white" fill-opacity="0.85" />
    <circle cx="196" cy="112" r="8" fill="url(#star-soft)" fill-opacity="0.5" />
  </g>
</svg>

